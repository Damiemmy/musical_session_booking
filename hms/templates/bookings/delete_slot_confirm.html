{% extends "base.html" %}

{% block content %}

<div class="min-h-[calc(100vh-140px)] flex items-center justify-center px-4 bg-black relative overflow-hidden">

    <!-- Glow Background -->
    <div class="absolute inset-0">
        <div class="absolute top-0 left-0 w-96 h-96 bg-red-600/20 blur-3xl rounded-full"></div>
        <div class="absolute bottom-0 right-0 w-96 h-96 bg-purple-700/20 blur-3xl rounded-full"></div>
    </div>

    <!-- Modal Card -->
    <div class="relative z-10 w-full max-w-md">

        <div class="bg-white/5 border border-white/10 backdrop-blur-2xl rounded-3xl shadow-2xl p-6 text-center">

            <!-- Icon -->
            <div class="text-5xl mb-4">⚠️</div>

            <h1 class="text-2xl font-bold text-white">
                Delete Slot?
            </h1>

            <p class="text-gray-400 text-sm mt-3">
                You are about to permanently delete this availability slot:
            </p>

            <!-- Slot Info -->
            <div class="mt-4 bg-black/40 border border-white/10 rounded-xl p-3 text-sm text-purple-300">
                {{ slot.start_time }} → {{ slot.end_time }}
            </div>

            <p class="text-xs text-gray-500 mt-3">
                This action cannot be undone.
            </p>

            <!-- Buttons -->
            <form method="POST" class="mt-6 space-y-3">
                {% csrf_token %}

                <button type="submit"
                    class="w-full py-3 rounded-xl bg-red-600 hover:bg-red-500 font-semibold transition">
                    Yes, Delete Slot
                </button>

                <a href="{% url 'doctor_slots' %}"
                   class="block w-full py-3 rounded-xl bg-white/10 hover:bg-white/20 text-white text-center font-semibold transition">
                    Cancel
                </a>
            </form>

        </div>

    </div>

</div>

{% endblock %}
