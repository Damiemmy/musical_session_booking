{% extends "base.html" %}

{% block content %}

<div class="min-h-[calc(100vh-140px)] flex items-center justify-center px-4 relative overflow-hidden bg-black">

    <!-- Glow -->
    <div class="absolute inset-0">
        <div class="absolute top-10 left-10 w-96 h-96 bg-green-500/20 blur-3xl rounded-full"></div>
        <div class="absolute bottom-10 right-10 w-96 h-96 bg-purple-700/20 blur-3xl rounded-full"></div>
    </div>

    <!-- Card -->
    <div class="relative z-10 w-full max-w-md">

        <div class="bg-white/5 border border-white/10 backdrop-blur-2xl rounded-3xl shadow-2xl p-8 text-center">

            <div class="text-5xl mb-4">🎉</div>

            <h1 class="text-2xl font-bold text-white">Booking Successful</h1>

            <p class="text-gray-400 mt-3 text-sm">
                Appointment booked successfully.
            </p>

            <div class="mt-4 text-purple-300 font-semibold text-sm">
                {{ slot.start_time }} → {{ slot.end_time }}
            </div>

            <a 
               class="inline-block mt-6 px-6 py-3 bg-green-600 hover:bg-green-500 rounded-xl font-semibold transition">
                View More Slots
            </a>

        </div>

    </div>

</div>

{% endblock %}
