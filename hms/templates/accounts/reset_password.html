{% extends "base.html" %}

{% block content %}

<div class="relative min-h-screen overflow-hidden bg-black text-white">

    <!-- BACKGROUND -->
    <div class="absolute inset-0">
        <img 
            src="https://images.unsplash.com/photo-1511379938547-c1f69419868d"
            class="w-full h-full object-cover opacity-40 scale-105"
        >
    </div>

    <div class="absolute inset-0 bg-black/70"></div>

    <!-- GLOW -->
    <div class="absolute inset-0 overflow-hidden">
        <div class="absolute -top-40 -left-40 w-96 h-96 bg-purple-600 blur-3xl opacity-20 rounded-full"></div>
        <div class="absolute bottom-0 right-0 w-96 h-96 bg-indigo-600 blur-3xl opacity-20 rounded-full"></div>
    </div>

    <!-- CENTER -->
    <div class="relative z-10 flex items-center justify-center min-h-screen px-4 sm:px-6">

        <div class="w-full max-w-md sm:max-w-lg">

            <div class="backdrop-blur-2xl bg-white/5 border border-white/10 rounded-3xl p-5 sm:p-8 shadow-[0_0_40px_rgba(168,85,247,0.2)]">

                <div class="text-center mb-6">
                    <h1 class="text-2xl sm:text-4xl font-extrabold">
                        Reset Password 🔐
                    </h1>

                    <p class="text-gray-300 text-sm mt-2">
                        Enter your new secure password below.
                    </p>
                </div>

                <!-- 🚨 ERROR HANDLING BLOCK -->
                {% if messages %}
                    <div class="mb-5 space-y-2">
                        {% for message in messages %}
                            <div class="px-4 py-3 rounded-2xl text-sm
                                        {% if message.tags == 'error' %}
                                            bg-red-500/10 border border-red-500/30 text-red-200
                                        {% else %}
                                            bg-green-500/10 border border-green-500/30 text-green-200
                                        {% endif %}">
                                {{ message }}
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}

                <form method="POST" class="space-y-5">
                    {% csrf_token %}

                    <!-- NEW PASSWORD -->
                    <div>
                        <label class="block text-sm text-gray-300 mb-2">New Password</label>
                        <input 
                            type="password"
                            name="new_password1"
                            placeholder="Enter new password"
                            class="w-full px-4 py-3 rounded-2xl bg-black/40 border border-white/10 text-white
                                   placeholder:text-gray-500 focus:ring-2 focus:ring-purple-500 outline-none"
                        >
                    </div>

                    <!-- CONFIRM PASSWORD -->
                    <div>
                        <label class="block text-sm text-gray-300 mb-2">Confirm Password</label>
                        <input 
                            type="password"
                            name="new_password2"
                            placeholder="Confirm new password"
                            class="w-full px-4 py-3 rounded-2xl bg-black/40 border border-white/10 text-white
                                   placeholder:text-gray-500 focus:ring-2 focus:ring-purple-500 outline-none"
                        >
                    </div>

                    <button 
                        type="submit"
                        class="w-full py-3 rounded-2xl bg-gradient-to-r from-fuchsia-600 via-purple-600 to-indigo-600
                               font-bold hover:scale-[1.02] transition"
                    >
                        Update Password
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
