{% extends "base.html" %}

{% block content %}

<div class="relative min-h-screen overflow-hidden bg-black text-white">

    <!-- BACKGROUND -->
    <div class="absolute inset-0">
        <img 
            src="https://images.unsplash.com/photo-1511379938547-c1f69419868d"
            class="w-full h-full object-cover opacity-40 scale-105"
        >
    </div>

    <div class="absolute inset-0 bg-black/70"></div>

    <!-- GLOW -->
    <div class="absolute inset-0 overflow-hidden">
        <div class="absolute top-20 left-0 w-96 h-96 bg-indigo-600 blur-3xl opacity-20 rounded-full"></div>
        <div class="absolute bottom-0 right-0 w-96 h-96 bg-fuchsia-600 blur-3xl opacity-20 rounded-full"></div>
    </div>

    <!-- CENTER -->
    <div class="relative z-10 flex items-center justify-center min-h-screen px-4">

        <div class="w-full max-w-md text-center">

            <div class="backdrop-blur-2xl bg-white/5 border border-white/10 rounded-3xl p-8 shadow-[0_0_40px_rgba(168,85,247,0.2)]">

                <div class="text-5xl mb-4">📩</div>

                <h1 class="text-2xl sm:text-3xl font-bold">
                    Check Your Email
                </h1>

                <p class="text-gray-300 text-sm mt-3 leading-relaxed">
                    If an account exists, we’ve sent a password reset link to your email.
                </p>

                <a 
                    href="/login/"
                    class="inline-block mt-6 px-6 py-3 rounded-2xl bg-gradient-to-r from-purple-600 to-indigo-600 font-semibold hover:scale-105 transition"
                >
                    Back to Login
                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
