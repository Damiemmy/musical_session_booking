<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Booking Confirmed</title>
</head>

<body style="margin:0; padding:0; background:#0a0a0a; font-family:Arial,sans-serif; color:#fff;">

<div style="max-width:600px; margin:0 auto; padding:40px 20px;">

    <div style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
                border-radius:20px; padding:30px; text-align:center;
                box-shadow:0 0 40px rgba(168,85,247,0.25);">

        <img src="https://i.imgur.com/IbDcEPU.png" style="width:110px; margin-bottom:15px;" />

        <h1 style="font-size:24px;">🎧 Booking Confirmed</h1>

        <p style="color:#ccc; font-size:14px; line-height:1.6;">
            Hello <b>{{ user.username }}</b>, your studio session has been successfully booked.
        </p>

        <div style="margin-top:20px; padding:15px; border-radius:12px;
                    background:rgba(99,102,241,0.1); border:1px solid rgba(99,102,241,0.3);
                    text-align:left;">

            <p style="margin:0;"><b>Producer:</b> {{ producer.username }}</p>
            <p style="margin:0;"><b>Date/Time:</b> {{ slot.start_time }}</p>

        </div>

        <p style="margin-top:20px; font-size:12px; color:#888;">
            Get ready to create something powerful 🚀
        </p>

    </div>

</div>

</body>
</html>
