<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Password Reset</title>
</head>

<body style="margin:0; padding:0; background:#0a0a0a; font-family:Arial,sans-serif; color:#ffffff;">

    <div style="max-width:600px; margin:0 auto; padding:40px 20px;">

        <!-- CARD -->
        <div style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
                    border-radius:20px; padding:30px; text-align:center;
                    box-shadow:0 0 40px rgba(168,85,247,0.2);">

            <!-- LOGO (CLICKABLE LOGIN LINK) -->
            <a href="{{ login_url }}" style="display:inline-block;">
                <img src="https://i.imgur.com/IbDcEPU.png" 
                     style="width:120px; margin-bottom:20px; cursor:pointer;" />
            </a>

            <h1 style="font-size:24px; margin-bottom:10px;">
                Password Reset Request 🎧
            </h1>

            <p style="color:#ccc; font-size:14px; line-height:1.6;">
                Hello <b>{{ user.username }}</b>, we received a request to reset your password for your Johnsonix account.
            </p>

            <!-- BUTTON -->
            <a href="{{ reset_link }}"
               style="display:inline-block; margin-top:25px; padding:12px 25px;
                      background:linear-gradient(90deg,#a855f7,#6366f1);
                      color:white; text-decoration:none; border-radius:12px;
                      font-weight:bold;">
                Reset Password
            </a>

            <p style="margin-top:25px; font-size:12px; color:#888;">
                If you didn’t request this, you can safely ignore this email.
            </p>

        </div>

        <!-- FOOTER -->
        <p style="text-align:center; font-size:11px; color:#666; margin-top:20px;">
            © Johnsonix Studio — Your Music Universe
        </p>

    </div>

</body>
</html>
