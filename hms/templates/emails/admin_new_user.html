<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>New User Alert</title>
</head>

<body style="margin:0; padding:0; background:#0a0a0a; font-family:Arial,sans-serif; color:#ffffff;">

    <div style="max-width:600px; margin:0 auto; padding:40px 20px;">

        <div style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
                    border-radius:20px; padding:30px; text-align:center;
                    box-shadow:0 0 40px rgba(255,0,100,0.2);">

            <h1 style="font-size:24px; margin-bottom:10px;">
                🚨 New User Registered
            </h1>

            <p style="color:#ccc; font-size:14px;">
                A new user just joined your platform Johnsonix Studio.
            </p>

            <div style="margin-top:20px; padding:15px; border-radius:12px;
                        background:rgba(168,85,247,0.1); border:1px solid rgba(168,85,247,0.3);
                        text-align:left;">

                <p style="margin:0; font-size:14px;"><b>Username:</b> {{ username }}</p>
                <p style="margin:0; font-size:14px;"><b>Email:</b> {{ email }}</p>

            </div>

            <p style="margin-top:20px; font-size:12px; color:#888;">
                Keep building 🚀 Your platform is growing.
            </p>

        </div>

        <p style="text-align:center; font-size:11px; color:#666; margin-top:20px;">
            Johnsonix Admin System
        </p>

    </div>

</body>
</html>
